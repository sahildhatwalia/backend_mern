<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .checkmark {
      font-size: 80px;
      color: #4caf50;
      margin-bottom: 20px;
      animation: scaleIn 0.5s ease-in-out;
    }
    @keyframes scaleIn {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }
    h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 15px;
    }
    p {
      font-size: 16px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    .session-id {
      background: #f0f4ff;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      word-break: break-all;
      font-size: 12px;
      color: #667eea;
      font-family: monospace;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: transform 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your payment. Your transaction has been completed successfully.</p>
    <div class="session-id" id="sessionId">Loading session details...</div>
    <p style="font-size: 14px; color: #999;">
      A confirmation email will be sent to you shortly.
    </p>
    <a href="http://localhost:4000/stripe-payment.html">Make Another Payment</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id');
    document.getElementById('sessionId').textContent = `Session ID: ${sessionId || 'N/A'}`;
  </script>
</body>
</html>
